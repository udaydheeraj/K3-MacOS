name: "SASt security Scan"

on:
  push:
    branches: [ "main" ]


jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      # 1. Fast filesystem scan with trivy

      - name: Run Trivy scan (htmlapp only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './html-sample-app-master/index.html' # scans only the app folder
          scanners: 'vuln,secret'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'


      # Deep static Analysis with CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript # handles JS within Html

      - name: Perform CodeQl Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      # Upload results to github security tab
      - name: upload trivy results to security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
    
