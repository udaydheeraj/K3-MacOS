name: "Sonar Scan"

on:
  push:
    branches: [ "main" ]


jobs:
  sonarcloud:
    name: SonarCloud scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: 
          fetch-depth: 0

      - name: SonarCloud scan
        uses: sonarsource/sonarqube-scan-action@master
        with:
          args: >
            -Dsonar.organization=udaydheeraj
            -Dsonar.projectKey=udaydheeraj_K3-MacOS
            -Dsonar.sources=html-sample-app-master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}